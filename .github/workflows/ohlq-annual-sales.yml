name: OHLQ Annual Sales Sync

on:
  workflow_dispatch:
    inputs:
      reportDate:
        description: "Optional single report date to refresh, formatted YYYY-MM-DD."
        required: false
        type: string
      days:
        default: "1"
        description: "Number of recent complete report dates to run when reportDate is blank."
        required: false
        type: string

concurrency:
  group: ohlq-annual-sales-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Download and import OHLQ reports
    runs-on: ubuntu-latest
    timeout-minutes: 75

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      OHLQ_OPS_USERNAME: ${{ secrets.OHLQ_OPS_USERNAME }}
      OHLQ_OPS_PASSWORD: ${{ secrets.OHLQ_OPS_PASSWORD }}
      OHLQ_MICROSOFT_USERNAME: ${{ secrets.OHLQ_MICROSOFT_USERNAME }}
      OHLQ_MICROSOFT_PASSWORD: ${{ secrets.OHLQ_MICROSOFT_PASSWORD }}
      OHLQ_BROWSER_CHANNEL: ""
      OHLQ_HEADLESS: "1"
      OHLQ_REPORT_RETENTION_DAYS: ${{ vars.OHLQ_REPORT_RETENTION_DAYS || '30' }}
      OHLQ_USE_PERSISTENT_BROWSER_CONTEXT: "1"
      OHLQ_USE_SERVERLESS_CHROMIUM: "0"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Validate required secrets
        shell: bash
        run: |
          missing=()
          for name in DATABASE_URL OHLQ_OPS_USERNAME OHLQ_OPS_PASSWORD OHLQ_MICROSOFT_USERNAME OHLQ_MICROSOFT_PASSWORD; do
            if [[ -z "${!name}" ]]; then
              missing+=("$name")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required GitHub secret(s): %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Run OHLQ annual sales import
        shell: bash
        run: |
          report_date="${{ github.event.inputs.reportDate || '' }}"
          days="${{ github.event.inputs.days || '1' }}"

          if [[ -n "$report_date" ]]; then
            npm run backfill:ohlq-annual-sales -- --date "$report_date"
          else
            npm run backfill:ohlq-annual-sales -- --days "$days"
          fi

      - name: Upload OHLQ debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ohlq-sales-debug-${{ github.run_id }}
          path: output/
          if-no-files-found: ignore
          retention-days: 7
